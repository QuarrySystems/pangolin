# Tier-1 MinIO proof — docker-compose stack (spec §2).
#
# §2.1 Endpoint duality
# ---------------------
# Host clients (e.g. the integration test driver, `pnpm run smoke`) reach MinIO
# at http://localhost:9000.
# The `serve` container and any sibling Docker workers it launches reach MinIO
# at http://host.docker.internal:9000 (resolved via `extra_hosts` below).
# AGORA_S3_ENDPOINT in the `serve` service is set to the latter form.
#
# Operator prerequisites
# ----------------------
# 1. Build the stock agora-worker image locally before `docker compose up`:
#      docker build -t ghcr.io/quarrysystems/agora-worker:latest \
#                   -f docker/agora-worker/Dockerfile .
#    (The worker image must include the AGORA_S3_ENDPOINT + AWS_* env handling
#    introduced for this proof.)
# 2. Optionally set DOCKER_GID to the host docker socket's GID if it differs
#    from the default 999 (run: `stat -c '%g' /var/run/docker.sock` on the host).
# 3. Set ANTHROPIC_API_KEY in ../../.env (the repo-root .env file).

name: agora-minio-proof

services:

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object store
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: agora-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ---------------------------------------------------------------------------
  # localstack — AWS Secrets Manager emulator (the proper secret lane).
  # serve stages ANTHROPIC_API_KEY here as a per-dispatch secret; the worker
  # resolves the ref over the network (cross-container, unlike a local-FS store).
  # ---------------------------------------------------------------------------
  localstack:
    image: localstack/localstack:3.8
    container_name: agora-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: "secretsmanager"
      DEFAULT_REGION: "us-east-1"
      EAGER_SERVICE_LOADING: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 5s

  # ---------------------------------------------------------------------------
  # minio-init — one-shot bucket creation (idempotent)
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: agora-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    # MC_HOST_myminio lets `mc` commands use the alias "myminio" without a
    # separate `mc alias set` call.
    environment:
      MC_HOST_myminio: "http://minioadmin:minioadmin@minio:9000"
    volumes:
      - ./scripts/init-buckets.sh:/init-buckets.sh:ro
    entrypoint: ["/bin/sh", "/init-buckets.sh"]

  # ---------------------------------------------------------------------------
  # serve-data-init — one-shot: chown the serve-data volume so the non-root
  # agora user (uid 1000) can write the SQLite DB on a fresh `docker compose up`.
  # Docker creates named volumes root-owned; this fixes that before serve starts.
  # ---------------------------------------------------------------------------
  serve-data-init:
    image: busybox
    container_name: agora-serve-data-init
    volumes:
      - serve-data:/data
    command: ["sh", "-c", "chown -R 1000:1000 /data"]
    restart: "no"

  # ---------------------------------------------------------------------------
  # serve — agora-orchestrator serve container (Tier-1 proof)
  # ---------------------------------------------------------------------------
  serve:
    build:
      # Context = repo root so the multi-stage build sees the full workspace
      # (packages/*, pnpm-workspace.yaml, pnpm-lock.yaml, etc.)
      context: ../..
      dockerfile: examples/offload-minio/Dockerfile.serve
    container_name: agora-serve
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      serve-data-init:
        condition: service_completed_successfully
      localstack:
        condition: service_healthy
    environment:
      # S3 / MinIO — host.docker.internal so the serve container reaches
      # the MinIO port exposed on the Docker host network (§2.1 duality).
      AGORA_S3_ENDPOINT: "http://host.docker.internal:9000"
      # Secrets Manager (LocalStack) — serve stages the per-dispatch secret here;
      # same host.docker.internal endpoint the worker uses (set via extraEnv).
      AWS_ENDPOINT_URL_SECRETS_MANAGER: "http://host.docker.internal:4566"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      # Config reads AGORA_S3_ACCESS_KEY / AGORA_S3_SECRET_KEY for its S3Client.
      AGORA_S3_ACCESS_KEY: minioadmin
      AGORA_S3_SECRET_KEY: minioadmin
      # Anthropic key is supplied by `env_file: ../../.env` below — do NOT also
      # list it here: a compose `environment:` entry overrides `env_file`, and the
      # `${ANTHROPIC_API_KEY}` interpolation resolves against the project-dir .env
      # (which doesn't exist here), blanking the key.
      # SQLite run-state DB — persisted on the named volume below.
      AGORA_DB_PATH: /data/agora.db
    volumes:
      # Docker socket — lets the serve container launch sibling worker containers.
      - /var/run/docker.sock:/var/run/docker.sock
      # Named volume for the SQLite DB — must be writable by uid 1000 (agora).
      - serve-data:/data
    # group_add: add the docker socket's GID so the non-root agora user (uid 1000)
    # can write to /var/run/docker.sock.  Default 999 matches most Linux hosts;
    # set DOCKER_GID in the environment if your host socket has a different GID.
    group_add:
      - "${DOCKER_GID:-999}"
    # Resolve host.docker.internal on Linux (no-op on Docker Desktop / macOS).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # No `ports:` — serve exposes no inbound port.  It communicates exclusively
    # via the MinIO mailbox (S3 object put/get).
    env_file:
      - ../../.env

volumes:
  minio-data:
  serve-data:
