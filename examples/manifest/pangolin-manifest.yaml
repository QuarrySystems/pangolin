# §4.5 worked manifest example.
#
# Drive this file with:
#
#   pangolin deploy --from examples/manifest/pangolin-manifest.yaml
#
# The deploy reconciler walks the manifest in three phases against the
# Pangolin ScaleClient your `pangolin.config.ts` exports:
#
#   1. capabilities  — bundle the `from:` directory; register via
#                      client.capabilities.register({ name, files })
#   2. subagents     — register via client.subagent.register({...});
#                      `capabilities:` cross-refs are resolved by name
#                      against the capabilities registered above.
#   3. envs          — register via client.env.register({...}); secrets
#                      pass through to the configured CredentialProvider.
#
# Re-registration is idempotent: the SDK is content-addressed (§4.3), so
# running this manifest twice against the same registry produces no new
# rows and the same contentHashes.

namespace: my-org

capabilities:
  - name: git-write
    from: ./caps/git-write/

subagents:
  - name: code-reviewer
    from: ./subagents/code-reviewer.yaml
    # Inline fallback `systemPrompt` so this manifest parses cleanly
    # against the DAG 2 parser, which has not yet learned to splice an
    # external subagent definition referenced via `from:`. When the
    # parser learns to dereference `from:`, this inline value can be
    # removed and the canonical body lives in `subagents/code-reviewer.yaml`.
    systemPrompt: |
      You are a thorough code reviewer. Read the diff, surface risks,
      and ask before suggesting destructive changes.
    model: claude-opus-4-1
    capabilities:
      - git-write

envs:
  - name: prod
    values:
      LOG_LEVEL: info
    secrets:
      # `from_env:` tells the deploy reconciler to materialise this
      # secret from `process.env.GH_TOKEN` at deploy time. The current
      # DAG 2 parser passes this shape through unchanged; a later task
      # adds the resolver that translates it into an InlineSecret. The
      # acceptance criterion for this example allows that gap.
      GH_TOKEN:
        from_env: GH_TOKEN
  - name: staging
    # `extends: prod` tells the reconciler to inherit prod's values and
    # secrets, then apply this entry's overrides. As with `from_env:`,
    # the DAG 2 parser passes this through unchanged; resolution lands
    # in a follow-up task.
    extends: prod
    values:
      LOG_LEVEL: debug
