# deploy/serve-stack — always-on pangolin serve stack (spec §2/§3).
#
# Hardened from examples/offload-minio/docker-compose.yml. Deltas (spec §3):
#   - restart: unless-stopped on minio / localstack / serve (long-lived services).
#   - env_file: .env is PROJECT-LOCAL (cp .env.example .env in this directory);
#     compose also interpolates ${DOCKER_GID} from the same file — no export step.
#   - build context ../.. with deploy/serve-stack/Dockerfile (workspace-member build).
#   - PANGOLIN_SIGNER_SEED_PATH on serve: the persisted signer seed lives on the
#     serve-data volume next to the SQLite DB.
#   - NO localstack volume: community LocalStack has no state persistence — a
#     volume would be misleading. Staged-secret loss across a localstack restart
#     is absorbed by dispatch retry at reconcile (spec §4.9).
#   - The worker image is CONFIG-level (DispatchExecutor.workerImage pins
#     ghcr.io/quarrysystems/pangolin-worker:main) — `docker compose pull` does NOT
#     refresh it; the update procedure runs an explicit `docker pull`.
# Healthchecks, pinned upstream image tags, and depends_on conditions are
# preserved VERBATIM from the example (binding).
#
# Endpoint duality (example §2.1, unchanged)
# ------------------------------------------
# Laptop clients reach MinIO at http://localhost:9000 (through the SSH tunnel).
# The serve container and the sibling Docker workers it launches reach MinIO at
# http://host.docker.internal:9000 (resolved via `extra_hosts` below).

name: pangolin-serve-stack

services:

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object store
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: pangolin-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ---------------------------------------------------------------------------
  # localstack — AWS Secrets Manager emulator (the proper secret lane).
  # serve stages ANTHROPIC_API_KEY here as a per-dispatch secret; the worker
  # resolves the ref over the network (cross-container, unlike a local-FS store).
  # No volume on purpose — community edition has no persistence.
  # ---------------------------------------------------------------------------
  localstack:
    image: localstack/localstack:3.8
    container_name: pangolin-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      SERVICES: "secretsmanager"
      DEFAULT_REGION: "us-east-1"
      EAGER_SERVICE_LOADING: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 5s

  # ---------------------------------------------------------------------------
  # minio-init — one-shot bucket creation (idempotent)
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: pangolin-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    # MC_HOST_myminio lets `mc` commands use the alias "myminio" without a
    # separate `mc alias set` call.
    environment:
      MC_HOST_myminio: "http://minioadmin:minioadmin@minio:9000"
    volumes:
      - ./scripts/init-buckets.sh:/init-buckets.sh:ro
    entrypoint: ["/bin/sh", "/init-buckets.sh"]

  # ---------------------------------------------------------------------------
  # serve-data-init — one-shot: chown the serve-data volume so the non-root
  # pangolin user (uid 1000) can write the SQLite DB + signer seed on a fresh
  # `docker compose up`. Docker creates named volumes root-owned; this fixes
  # that before serve starts.
  # ---------------------------------------------------------------------------
  serve-data-init:
    image: busybox
    container_name: pangolin-serve-data-init
    volumes:
      - serve-data:/data
    command: ["sh", "-c", "chown -R 1000:1000 /data"]
    restart: "no"

  # ---------------------------------------------------------------------------
  # serve — pangolin-orchestrator serve container (always-on)
  # ---------------------------------------------------------------------------
  serve:
    build:
      # Context = repo root so the multi-stage build sees the full workspace
      # (packages/*, examples/*, deploy/*, pnpm-workspace.yaml, pnpm-lock.yaml).
      context: ../..
      dockerfile: deploy/serve-stack/Dockerfile
    container_name: pangolin-serve
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      serve-data-init:
        condition: service_completed_successfully
      localstack:
        condition: service_healthy
    environment:
      # S3 / MinIO — host.docker.internal so the serve container reaches
      # the MinIO port exposed on the Docker host network (endpoint duality).
      PANGOLIN_S3_ENDPOINT: "http://host.docker.internal:9000"
      # Secrets Manager (LocalStack) — serve stages the per-dispatch secret here;
      # same host.docker.internal endpoint the worker uses (set via extraEnv).
      AWS_ENDPOINT_URL_SECRETS_MANAGER: "http://host.docker.internal:4566"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      # Config reads PANGOLIN_S3_ACCESS_KEY / PANGOLIN_S3_SECRET_KEY for its S3Client.
      PANGOLIN_S3_ACCESS_KEY: minioadmin
      PANGOLIN_S3_SECRET_KEY: minioadmin
      # Anthropic key is supplied by `env_file: .env` below — do NOT also list
      # it here: a compose `environment:` entry overrides `env_file`.
      # SQLite run-state DB — persisted on the named volume below.
      PANGOLIN_DB_PATH: /data/pangolin.db
      # Persisted signer seed (spec S5) — generated 0600 on first boot, read on
      # every later boot; lives on the same volume so the keypair survives
      # restarts and the published public key stays stable.
      PANGOLIN_SIGNER_SEED_PATH: /data/signer-seed.hex
    volumes:
      # Docker socket — lets the serve container launch sibling worker containers.
      - /var/run/docker.sock:/var/run/docker.sock
      # Named volume for the SQLite DB + signer seed — writable by uid 1000 (pangolin).
      - serve-data:/data
    # group_add: add the docker socket's GID so the non-root pangolin user (uid 1000)
    # can write to /var/run/docker.sock. Default 999 matches most Linux hosts;
    # set DOCKER_GID in this directory's .env if your host socket differs.
    group_add:
      - "${DOCKER_GID:-999}"
    # Resolve host.docker.internal on Linux (no-op on Docker Desktop / macOS).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # No `ports:` — serve exposes no inbound port.  It communicates exclusively
    # via the MinIO mailbox (S3 object put/get).
    env_file:
      - .env

volumes:
  minio-data:
  serve-data:
