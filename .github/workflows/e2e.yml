name: e2e

# Runs the repo-root cross-package E2E suite (`test/`), which is NOT a
# workspace package and is therefore not covered by the `ci` workflow's
# `pnpm -r test`.
#
# This job runs the logic/contract suites (credential rejection, content-hash
# versioning, manifest deploy, MCP tool surface, monorepo bootstrap, the
# in-process runtime-adapter seam). The container-backed suites are gated
# behind `AGORA_E2E_DOCKER=1` (not set here) because they need the pinned
# worker image pulled + a runtime — run those on a dedicated runner. The
# live-AWS suite stays gated behind its AGORA_E2E_AWS_* env vars.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: root e2e suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      # The e2e suites load package src that imports `@quarry-systems/*` by
      # name, resolving to built dist/; build the workspace first.
      - name: Build
        run: pnpm -r build

      - name: E2E
        run: pnpm test:e2e
