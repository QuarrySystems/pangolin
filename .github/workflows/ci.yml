name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm -r lint

      # Build before test: vitest resolves cross-package imports
      # (e.g. @quarry-systems/agora-core) via each package's dist entry,
      # which only exists after a build. pnpm builds in topological order.
      - name: Build
        run: pnpm -r build

      # --workspace-concurrency=1 runs each package's suite one at a time.
      # Parallel (default) launches all suites × their vitest workers at once,
      # which flakes resource-heavy imports (e.g. the MCP SDK in agora-mcp)
      # under CI's limited cores. Serial is slower but deterministic.
      - name: Test
        run: pnpm -r --workspace-concurrency=1 test
